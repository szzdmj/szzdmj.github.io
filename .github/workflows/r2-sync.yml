name: Sync book_html/media to R2

on:
  push:
    branches: [ "main" ]
    paths:
      - "book_html/media/**"
      - "scripts/r2-sync.mjs"
      - "package.json"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: php-src
          SRC_DIR: book_html/media
          R2_PREFIX: book_html/media
          CONCURRENCY: 8
        run: npm run r2:sync
        
